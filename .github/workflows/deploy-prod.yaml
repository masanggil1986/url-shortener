name: 프로덕션 배포

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: 소스코드 받아오기
        uses: actions/checkout@v5

      - name: Node.js 설치
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'

      - name: 의존성 설치
        run: npm install

      - name: Prisma 마이그레이션
        run: |
          export DATABASE_URL="file:./dev.db"
          npx prisma migrate deploy && npx prisma generate

      - name: 타입 체크
        run: npx tsc --noEmit

      - name: 테스트 실행
        run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: 소스코드 받아오기
        uses: actions/checkout@v5

      - name: 소스코드 업로드
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          overwrite: true
          source: "./**,!.git/**"
          target: "/home/ec2-user/url-shortener"

      - name: SSH 로 원격 서버에 접속하여 배포 스크립트 실행
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          script: |
            cd /home/ec2-user/url-shortener
            npm install
            export DATABASE_URL="file:./dev.db"
            npx prisma migrate deploy && npx prisma generate
            npm run build
            pm2 delete all || true
            pm2 start dist/server.js --name url-shortener